name: Update Dashboard

on:
  schedule:
    # Runs daily at 10:00 UTC (6am ET / 3am PT)
    - cron: '0 10 * * *'
  push:
    branches: [main]
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  # Only one run at a time per branch; cancel any in-progress overlap to avoid push races.
  group: update-dashboard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-deploy:
    # Skip runs triggered by the bot's own data-refresh commits to avoid cascade.
    if: "github.event_name != 'push' || (github.actor != 'github-actions[bot]' && !startsWith(github.event.head_commit.message, 'chore: daily'))"
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ github.event.repository.html_url }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas numpy pybaseball requests beautifulsoup4

      - name: Fetch 2026 stats (current bat_2026.csv / pit_2026.csv)
        run: python fetch_stats.py
        continue-on-error: true  # Don't fail if season hasn't started

      - name: Snapshot today's stats + rebuild rolling index
        # fetch_stats.py only writes the *current* CSVs. The rolling/trend
        # columns (14d HOT/COLD, 7d+ LCV delta) need a dated snapshot per day
        # plus index.json/lcv_stats.json rebuilt from them. This was part of the
        # old local routine and was missing after the CI migration.
        run: |
          DATE=$(TZ='America/New_York' date +%F)
          made=0
          if [ -s data/bat_2026.csv ] && [ "$(wc -l < data/bat_2026.csv)" -gt 1 ]; then
            cp data/bat_2026.csv "data/snapshots/bat_${DATE}.csv"
            echo "Wrote data/snapshots/bat_${DATE}.csv"; made=1
          else
            echo "bat_2026.csv empty/missing — skipping bat snapshot"
          fi
          if [ -s data/pit_2026.csv ] && [ "$(wc -l < data/pit_2026.csv)" -gt 1 ]; then
            cp data/pit_2026.csv "data/snapshots/pit_${DATE}.csv"
            echo "Wrote data/snapshots/pit_${DATE}.csv"; made=1
          else
            echo "pit_2026.csv empty/missing — skipping pit snapshot"
          fi
          if [ "$made" = "1" ]; then
            python tools/build_snapshots_index.py
          else
            echo "No fresh stat CSVs — leaving rolling index unchanged"
          fi
        continue-on-error: true  # Don't block deploy if the stats fetch produced nothing

      - name: Fetch Baseball Savant statcast + percentile ranks
        run: python fetch_savant.py
        continue-on-error: true  # Don't fail the deploy if Savant is down

      - name: Fetch FanGraphs Stuff+ / Location+ / Pitching+
        run: python fetch_stuffplus.py
        continue-on-error: true  # Don't fail the deploy if FanGraphs is down

      - name: Scrape CBS league (transactions + rosters) via cookies
        env:
          CBS_COOKIES_JSON: ${{ secrets.CBS_COOKIES_JSON }}
        run: |
          if [ -z "$CBS_COOKIES_JSON" ]; then
            echo "CBS_COOKIES_JSON secret not set — skipping CBS scrape"
            exit 0
          fi
          printf '%s' "$CBS_COOKIES_JSON" > /tmp/cbs-cookies.json
          python scrape_cbs.py transactions --cookies /tmp/cbs-cookies.json
          python scrape_cbs.py rosters      --cookies /tmp/cbs-cookies.json
          python scrape_cbs.py matchup      --cookies /tmp/cbs-cookies.json
          rm -f /tmp/cbs-cookies.json
        continue-on-error: true  # Don't block deploy if CBS cookies expire — validate.py's freshness gate will flag it

      - name: Commit daily snapshots back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/snapshots/ data/bat_2026.csv data/pit_2026.csv data/bat_statcast_2026.csv data/stuff_plus_2026.csv data/savant_percentiles_bat_2026.csv data/savant_percentiles_pit_2026.csv data/cbs_transactions.json data/cbs_rosters.json data/season_status.json data/last_daily_run.json || true
          if git diff --cached --quiet; then
            echo "No new snapshot files to commit"
          else
            git commit -m "chore: daily stat + Savant + Stuff+ refresh $(date -u +%Y-%m-%d)"
            # Retry on race: if another concurrent run pushed first, rebase and try again.
            for i in 1 2 3; do
              if git push; then
                break
              fi
              echo "push attempt $i failed, rebasing and retrying..."
              git pull --rebase origin main || true
              sleep $((i * 3))
            done
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate data (safeguards)
        run: python validate.py

      - name: Build dashboard
        run: python build_dashboard.py

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
