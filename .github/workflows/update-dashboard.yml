name: Update Dashboard

on:
  schedule:
    # Runs daily at 10:00 UTC (6am ET / 3am PT)
    - cron: '0 10 * * *'
  push:
    branches: [main]
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    # Rebuild on schedule, manual trigger, or push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas numpy pybaseball

      - name: Fetch 2026 stats
        run: python fetch_stats.py
        continue-on-error: true  # Don't fail if season hasn't started

      - name: Build dashboard
        run: python build_dashboard.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "Update dashboard $(date -u +%Y-%m-%d)"
          git push

  deploy:
    # Run deploy after update (if it ran), or directly on push
    if: always() && !cancelled()
    needs: [update]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ github.event.repository.html_url }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deploy to Porkbun via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: pixie-ss1-ftp.porkbun.com
          username: markpytlik.com
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /dpf/
          exclude: |
            **/.git*
            **/.git*/**
            **/data/**
            **/build_dashboard.py
            **/fetch_stats.py
            **/requirements.txt
            **/*.md
            **/*.py
