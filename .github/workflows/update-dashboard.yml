name: Update Dashboard

on:
  schedule:
    # Runs daily at 10:00 UTC (6am ET / 3am PT)
    - cron: '0 10 * * *'
  push:
    branches: [main]
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ github.event.repository.html_url }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas numpy pybaseball

      - name: Fetch 2026 stats
        run: python fetch_stats.py
        continue-on-error: true  # Don't fail if season hasn't started

      - name: Build dashboard
        run: python build_dashboard.py

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deploy to Porkbun via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: pixie-ss1-ftp.porkbun.com
          username: markpytlik.com
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /dpf/
          exclude: |
            **/.git*
            **/.git*/**
            **/build_dashboard.py
            **/fetch_stats.py
            **/requirements.txt
            **/*.md
            **/*.py
